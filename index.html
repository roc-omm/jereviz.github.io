<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Pédagogique</title>
    
    <!-- Polices et icônes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Nos fichiers CSS -->
    <link rel="stylesheet" href="dashboard-style.css">
    <link rel="stylesheet" href="dashboard-modern.css">
</head>
<body>
    <div class="app-container">
        <!-- Header avec les deux boutons principaux -->
        <header class="app-header">
            <div class="header-title">
                <h1>📚 Espace Pédagogique</h1>
                <p>Plateforme de révision interactive</p>
            </div>
            <div class="mode-switcher">
                <button class="mode-btn settings active" onclick="switchMode('settings')">
                    <i class="fas fa-cog"></i>
                    <span>Réglages</span>
                </button>
                <button class="mode-btn revision" onclick="switchMode('revision')">
                    <i class="fas fa-pencil-alt"></i>
                    <span>Révision</span>
                </button>
            </div>
        </header>

        <!-- Fil d'Ariane -->
        <div class="breadcrumb" id="breadcrumb">
            <!-- <span class="breadcrumb-item active" onclick="navigateTo('home')">
                <i class="fas fa-home"></i>
                Accueil
            </span> -->
        </div>

        <!-- Zone de contenu principal -->
        <div id="mainContent" class="content-area">
            <!-- Le contenu est chargé dynamiquement -->
        </div>
    </div>

    <!-- Script principal -->
    <script src="dashboard.js"></script>
</body>
</html>
