<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Pédagogique - Anti-Sèche Bureautique</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Quill for rich text -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --primary-50: #eef2ff;
            --primary-100: #e0e7ff;
            --primary-200: #c7d2fe;
            --primary-300: #a5b4fc;
            --primary-400: #818cf8;
            --primary-500: #6366f1;
            --primary-600: #4f46e5;
            --primary-700: #4338ca;
            --primary-800: #3730a3;
            --primary-900: #312e81;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            
            --success-50: #ecfdf5;
            --success-500: #10b981;
            --success-700: #047857;
            
            --warning-50: #fffbeb;
            --warning-500: #f59e0b;
            --warning-700: #b45309;
            
            --danger-50: #fef2f2;
            --danger-500: #ef4444;
            --danger-700: #b91c1c;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
        }

        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--gray-900);
            line-height: 1.5;
        }

        /* ===== LAYOUT PRINCIPAL ===== */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Header moderne */
        .app-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-xl);
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .header-title h1 {
            font-size: 1.875rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-600), var(--primary-800));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.25rem;
        }

        .header-title p {
            color: var(--gray-500);
            font-size: 0.875rem;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
        }

        /* Navigation hiérarchique */
        .breadcrumb {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .breadcrumb-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-500);
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.25rem 0.5rem;
            border-radius: var(--radius-md);
        }

        .breadcrumb-item:hover {
            background: var(--gray-100);
            color: var(--primary-600);
        }

        .breadcrumb-item.active {
            color: var(--primary-600);
            font-weight: 500;
        }

        .breadcrumb-separator {
            color: var(--gray-300);
        }

        /* ===== CARTES MODERNES ===== */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .modern-card {
            background: white;
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid var(--gray-200);
            position: relative;
            overflow: hidden;
        }

        .modern-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary-300);
        }

        .modern-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-400), var(--primary-600));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modern-card:hover::before {
            opacity: 1;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--primary-600);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        .card-stats {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
            padding: 1rem 0;
            border-top: 1px solid var(--gray-200);
            border-bottom: 1px solid var(--gray-200);
        }

        .stat {
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-600);
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card-footer {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        /* ===== MODALS MODERNES ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modern-modal {
            background: white;
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, var(--primary-50), var(--primary-100));
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
        }

        .modal-header h2 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--gray-900);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-500);
            transition: all 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
        }

        .modal-close:hover {
            background: white;
            color: var(--danger-500);
        }

        .modal-content {
            padding: 2rem;
        }

        /* ===== FORMULAIRES MODERNES ===== */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--gray-700);
            font-size: 0.875rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-lg);
            font-size: 0.95rem;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary-400);
            box-shadow: 0 0 0 4px var(--primary-100);
        }

        .form-input:hover,
        .form-select:hover,
        .form-textarea:hover {
            border-color: var(--gray-300);
        }

        /* ===== TABS MODERNES ===== */
        .modern-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--gray-100);
            padding: 0.5rem;
            border-radius: var(--radius-lg);
        }

        .tab-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            background: transparent;
            border-radius: var(--radius-md);
            font-weight: 500;
            color: var(--gray-600);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .tab-btn i {
            font-size: 1rem;
        }

        .tab-btn:hover {
            background: white;
            color: var(--primary-600);
        }

        .tab-btn.active {
            background: white;
            color: var(--primary-600);
            box-shadow: var(--shadow-sm);
        }

        .tab-pane {
            display: none;
        }

        .tab-pane.active {
            display: block;
        }

        /* ===== CONSTRUCTEUR DE QUIZ ===== */
        .quiz-builder {
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
        }

        .question-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--gray-200);
            transition: all 0.2s;
        }

        .question-card:hover {
            border-color: var(--primary-300);
            box-shadow: var(--shadow-md);
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .question-number {
            background: var(--primary-100);
            color: var(--primary-700);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .remove-question {
            background: var(--danger-50);
            border: none;
            color: var(--danger-500);
            width: 32px;
            height: 32px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s;
        }

        .remove-question:hover {
            background: var(--danger-500);
            color: white;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .option-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            background: var(--gray-50);
            border-radius: var(--radius-md);
            border: 1px solid var(--gray-200);
        }

        .option-item.correct {
            background: var(--success-50);
            border-color: var(--success-500);
        }

        .option-radio {
            width: 20px;
            height: 20px;
            accent-color: var(--primary-600);
        }

        /* ===== BOUTONS ===== */
        .btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: var(--radius-lg);
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-lg);
            background: linear-gradient(135deg, var(--primary-700), var(--primary-800));
        }

        .btn-secondary {
            background: white;
            color: var(--gray-700);
            border: 1px solid var(--gray-300);
        }

        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--gray-400);
        }

        .btn-success {
            background: var(--success-500);
            color: white;
        }

        .btn-success:hover {
            background: var(--success-700);
        }

        .btn-icon {
            padding: 0.625rem;
            border-radius: var(--radius-md);
        }

        /* ===== UTILITAIRES ===== */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: white;
            border-radius: var(--radius-xl);
            color: var(--gray-500);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--gray-300);
            margin-bottom: 1rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .badge-primary {
            background: var(--primary-100);
            color: var(--primary-700);
        }

        .badge-success {
            background: var(--success-50);
            color: var(--success-700);
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app-container {
                padding: 1rem;
            }
            
            .app-header {
                flex-direction: column;
                text-align: center;
                gap: 1rem;
            }
            
            .options-grid {
                grid-template-columns: 1fr;
            }
            
            .content-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header moderne -->
        <header class="app-header">
            <div class="header-title">
                <h1>📚 Espace Pédagogique</h1>
                <p>Gérez vos classes, matières et chapitres en toute simplicité</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="showNotification('guide')">
                    <i class="fas fa-question-circle"></i>
                    Guide
                </button>
                <button class="btn btn-primary" onclick="showQuickAdd()">
                    <i class="fas fa-plus-circle"></i>
                    Création rapide
                </button>
            </div>
        </header>

        <!-- Fil d'Ariane -->
        <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item active" onclick="loadView('classes')">
                <i class="fas fa-home"></i>
                Accueil
            </span>
        </div>

        <!-- Zone de contenu principal -->
        <div id="mainContent" class="fade-in">
            <!-- Le contenu est chargé dynamiquement -->
        </div>
    </div>

    <!-- Modal pour les classes -->
    <div class="modal-overlay" id="classModal">
        <div class="modern-modal">
            <div class="modal-header">
                <h2><i class="fas fa-school"></i> Nouvelle classe</h2>
                <button class="modal-close" onclick="closeModal('classModal')">&times;</button>
            </div>
            <div class="modal-content">
                <form id="classForm" onsubmit="createClass(event)">
                    <div class="form-group">
                        <label class="form-label">Nom de la classe</label>
                        <input type="text" class="form-input" placeholder="ex: Seconde, Première..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Niveau</label>
                        <select class="form-select">
                            <option>Lycée</option>
                            <option>Collège</option>
                            <option>Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Couleur</label>
                        <input type="color" class="form-input" value="#6366f1">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-plus-circle"></i>
                        Créer la classe
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal pour les matières -->
    <div class="modal-overlay" id="subjectModal">
        <div class="modern-modal">
            <div class="modal-header">
                <h2><i class="fas fa-book"></i> Nouvelle matière</h2>
                <button class="modal-close" onclick="closeModal('subjectModal')">&times;</button>
            </div>
            <div class="modal-content">
                <form id="subjectForm" onsubmit="createSubject(event)">
                    <div class="form-group">
                        <label class="form-label">Nom de la matière</label>
                        <input type="text" class="form-input" placeholder="ex: Bureautique, Programmation..." required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-textarea" rows="3" placeholder="Description de la matière..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Icône</label>
                        <select class="form-select">
                            <option>💻 Bureautique</option>
                            <option>🔧 Programmation</option>
                            <option>🌐 Réseaux</option>
                            <option>🎨 Design</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">
                        <i class="fas fa-plus-circle"></i>
                        Créer la matière
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Modal pour les chapitres (avec onglets) -->
    <div class="modal-overlay" id="chapterModal">
        <div class="modern-modal" style="max-width: 900px;">
            <div class="modal-header">
                <h2><i class="fas fa-chapter"></i> Nouveau chapitre</h2>
                <button class="modal-close" onclick="closeModal('chapterModal')">&times;</button>
            </div>
            <div class="modal-content">
                <!-- Tabs modernes -->
                <div class="modern-tabs">
                    <button class="tab-btn active" onclick="switchTab('fundamentals')">
                        <i class="fas fa-book-open"></i>
                        Fondamentaux
                    </button>
                    <button class="tab-btn" onclick="switchTab('quiz')">
                        <i class="fas fa-question-circle"></i>
                        Quiz
                    </button>
                </div>

                <form id="chapterForm" onsubmit="createChapter(event)">
                    <!-- Informations communes -->
                    <div class="form-group">
                        <label class="form-label">Titre du chapitre</label>
                        <input type="text" class="form-input" placeholder="ex: Word - Les bases" required>
                    </div>

                    <!-- Onglet Fondamentaux -->
                    <div id="fundamentalsTab" class="tab-pane active">
                        <div class="form-group">
                            <label class="form-label">Objectifs pédagogiques</label>
                            <div id="objectivesEditor" style="height: 150px;"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Points clés</label>
                            <div id="keyPointsEditor" style="height: 150px;"></div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Ressources</label>
                            <div id="resourcesEditor" style="height: 150px;"></div>
                        </div>
                    </div>

                    <!-- Onglet Quiz -->
                    <div id="quizTab" class="tab-pane">
                        <div class="quiz-builder">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                                <h3 style="font-size: 1.1rem; color: var(--gray-700);">
                                    <i class="fas fa-list"></i>
                                    Questions du quiz
                                </h3>
                                <button type="button" onclick="addQuestion()" class="btn btn-success">
                                    <i class="fas fa-plus"></i>
                                    Ajouter une question
                                </button>
                            </div>
                            <div id="questionsList"></div>
                        </div>
                    </div>

                    <div style="margin-top: 2rem; text-align: right;">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i>
                            Créer le chapitre
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
